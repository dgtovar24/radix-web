name: Deploy to Self-Hosted Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t radix-web:latest .

      - name: Stop Old Container
        run: docker stop radix-web-app || true

      - name: Remove Old Container
        run: docker rm radix-web-app || true

      - name: Run New Container
        run: |
          docker run -d \
            --name radix-web-app \
            --restart unless-stopped \
            --network dokploy-network \
            -e API_BASE_URL=http://radix-api:9000/v1 \
            -e PUBLIC_API_URL=https://api.raddix.pro/v1 \
            --label "traefik.enable=true" \
            --label "traefik.http.routers.radix-web.rule=Host(\`raddix.pro\`) || Host(\`www.raddix.pro\`) || Host(\`aiflex.dev\`) || Host(\`www.aiflex.dev\`)" \
            --label "traefik.http.routers.radix-web.entrypoints=web,websecure" \
            --label "traefik.http.routers.radix-web.tls=true" \
            --label "traefik.http.routers.radix-web.tls.certresolver=letsencrypt" \
            --label "traefik.http.services.radix-web.loadbalancer.server.port=4321" \
            radix-web:latest

      - name: Health Check
        run: |
          echo "Waiting for radix-web to become healthy..."
          for i in $(seq 1 20); do
            STATUS=$(docker inspect -f '{{.State.Status}}' radix-web-app 2>/dev/null || echo "missing")
            if [ "$STATUS" = "running" ]; then
              HTTP_CODE=$(docker exec radix-web-app node -e "require('http').get('http://localhost:4321/',r=>{process.exit(r.statusCode===200||r.statusCode===301||r.statusCode===302?0:1)}).on('error',()=>process.exit(2))" 2>/dev/null && echo "200" || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "radix-web is healthy (HTTP OK)"
                exit 0
              fi
            fi
            echo "Attempt $i/20: status=$STATUS http=$HTTP_CODE"
            sleep 3
          done
          echo "Health check failed. Container logs:"
          docker logs --tail 50 radix-web-app || true
          exit 1
